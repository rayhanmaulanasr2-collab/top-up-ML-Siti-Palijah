<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Top Up ML Siti Palijah</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #020617;
  color: white;
}

header {
  background: #0f172a;
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #0f172a;
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
}

.nominal button {
  margin: 5px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  background: #1e293b;
  color: white;
}

.nominal button:hover {
  background: #38bdf8;
  color: black;
}

.selected {
  background: #38bdf8 !important;
  color: black;
}

.checkout {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: gold;
  font-weight: bold;
  cursor: pointer;
}
</style>

</head>

<body>

<header>🎮 Top Up Mobile Legends Siti Palijah</header>

<div class="container">

  <div class="card">
    <h3>Masukkan Data</h3>

    <input type="text" id="userID" placeholder="User ID">
    <input type="text" id="serverID" placeholder="Server ID">
  </div>

  <div class="card">
    <h3>Pilih Diamond</h3>

    <div class="nominal">
      <button onclick="pilih(86, '86 Diamond')">86 💎</button>
      <button onclick="pilih(172, '172 Diamond')">172 💎</button>
      <button onclick="pilih(257, '257 Diamond')">257 💎</button>
      <button onclick="pilih(344, '344 Diamond')">344 💎</button>
    </div>
  </div>

  <div class="card">
    <h3>Pembayaran</h3>
    <p>DANA / OVO / Transfer Bank</p>
  </div>

  <button class="checkout" onclick="checkout()">Checkout</button>

</div>

<script>
let selectedNominal = "";
let selectedHarga = 0;

function pilih(harga, nama) {
  selectedNominal = nama;
  selectedHarga = harga;

  let buttons = document.querySelectorAll(".nominal button");
  buttons.forEach(btn => btn.classList.remove("selected"));

  event.target.classList.add("selected");
}

function checkout() {
  let user = document.getElementById("userID").value;
  let server = document.getElementById("serverID").value;

  if(user === "" || server === "" || selectedNominal === "") {
    alert("Lengkapi data dulu!");
  } else {
    alert(
      "Detail Top Up:\n" +
      "User ID: " + user +
      "\nServer: " + server +
      "\nItem: " + selectedNominal +
      "\n\nLanjut ke pembayaran..."
    );
  }
}
</script>

</body>
</html>
